name: build-test-dashboard

on: [push, pull_request]  

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: run Ruff
      - uses: astral-sh/ruff-action@v1

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code  # Fixed: Added space after the hyphen
        uses: actions/checkout@v4

      - name: Set up docker Buildx
        uses: docker/setup-buildx-action@v3 # Fixed: Removed trailing single quote

      - name: Build and run tests
        run: |
          # Note: Modern runners support 'docker compose' (no hyphen)
          docker compose up --build --exit-code-from test_app

      - name: Shut down containers
        if: always()
        run: docker compose down

  